<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CROWS — Header Mockup</title>
<style>
  :root {
    --ink:          #14181C;
    --accent:       #3B6E5C;
    --accent-soft:  #9FB8AC;
    --bg-page:      #F4F5F3;
    --text-on-dark: #FFFFFF;
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-ui); background: var(--bg-page); }

  .site-header {
    background: var(--ink);
    border-bottom: 3px solid var(--accent);
    padding: 14px 32px;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header-title {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .header-app {
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--text-on-dark);
    letter-spacing: 0.06em;
  }
  .header-tagline {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--accent-soft);
  }
  .header-clock {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.55);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
</style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="header-app">C.R.O.W.S.</span>
        <span class="header-tagline">Weather Risk Scoring for Campus Decisions</span>
      </div>
      <div class="header-clock">Tue, Jun 30, 2026 · 2:14 PM</div>
    </div>
  </header>

</body>
</html>
